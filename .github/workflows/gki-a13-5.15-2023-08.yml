name: GKI Kernel Build (A13 5.15 2023-08)

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: Output directory of gki
        default: android13-5.15
      version_name:
        required: true
        type: string
        description: With SUBLEVEL of kernel (used for artifact naming)
        default: android13-5.15-2023-08
      tag:
        required: true
        type: string
        description: Part of branch name of common kernel manifest
        default: android13-5.15-2023-08
      os_patch_level:
        required: false
        type: string
        description: Patch level of common kernel manifest
        default: 2023-08
      patch_path:
        required: false
        type: string
        description: Directory name of .github/patches/<patch_path>
        default: 5.15
      use_cache:
        required: false
        type: boolean
        default: true
      debug:
        required: false
        type: boolean
        default: false
      build_lkm:
        required: false
        type: boolean
        default: false
      better_net:
        required: false
        type: boolean
        description: Enable extra networking config.
        default: true
      adocker:
        required: false
        type: boolean
        default: false
        description: Enable Docker support (requires docker/ directory in repo)
      ksu_version:
        required: false
        type: string
        description: KernelSU version (branch, tag, or commit). Empty for latest, but pinning is recommended for older kernel branches.
        default: ""
      anykernel_repo:
        required: false
        type: string
        description: AnyKernel3 repo to package the kernel with.
        default: Kernel-SU/AnyKernel3
      anykernel_ref:
        required: false
        type: string
        description: AnyKernel3 branch, tag, or commit. Empty uses repo default branch.
        default: ""
      anykernel_image_name:
        required: false
        type: string
        description: Kernel image filename expected by the AnyKernel3 repo.
        default: Image
      runs_on:
        required: false
        type: string
        description: Runner label (e.g. ubuntu-22.04 or ubuntu-24.04)
        default: ubuntu-22.04

jobs:
  build:
    name: Build ${{ inputs.version_name }}
    runs-on: ${{ inputs.runs_on }}
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison flex libssl-dev libelf-dev dwarves ccache tree dos2unix

      - name: Configure Git and repo
        run: |
          git config --global user.email "bot@kernelsu.org"
          git config --global user.name "KernelSUBot"
          curl -LSs https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: Clone KernelSU
        run: |
          git clone https://github.com/tiann/KernelSU.git KernelSU --depth 1
          if [ -n "${{ inputs.ksu_version }}" ]; then
            cd KernelSU
            git fetch --depth 1 origin "${{ inputs.ksu_version }}" || \
              git fetch --depth 1 origin "refs/tags/${{ inputs.ksu_version }}" || \
              git fetch --depth 1 origin "${{ inputs.ksu_version }}:refs/remotes/origin/${{ inputs.ksu_version }}" || \
              git fetch --depth 1 origin
            git checkout "${{ inputs.ksu_version }}"
          fi

      - name: KernelSU version info
        run: |
          cd KernelSU
          COMMIT_HASH=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git log -1 --format=%cd --date=short)
          BRANCH_OR_TAG=$(git describe --tags 2>/dev/null || git branch --show-current || true)

          echo "=== KernelSU Version Information ==="
          echo "Version: ${BRANCH_OR_TAG:-unknown}"
          echo "Commit Hash: $COMMIT_HASH"
          echo "Commit Date: $COMMIT_DATE"

      - name: Setup need_upload
        id: need_upload
        run: |
          if [ ! -z "${{ secrets.BOT_TOKEN }}" ]; then
            echo "UPLOAD=true" >> $GITHUB_OUTPUT
          else
            echo "UPLOAD=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup kernel source
        run: |
          echo "Free space:"
          df -h
          cd $GITHUB_WORKSPACE
          mkdir android-kernel && cd android-kernel
          repo init --depth=1 --u https://android.googlesource.com/kernel/manifest -b common-${{ inputs.tag }} --repo-rev=v2.16
          REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common ${{ inputs.tag }})
          DEFAULT_MANIFEST_PATH=.repo/manifests/default.xml
          if grep -q deprecated <<< $REMOTE_BRANCH; then
            echo "Found deprecated branch: ${{ inputs.tag }}"
            sed -i 's/"${{ inputs.tag }}"/"deprecated\/${{ inputs.tag }}"/g' $DEFAULT_MANIFEST_PATH
            cat $DEFAULT_MANIFEST_PATH
          fi
          repo --version

      - name: Cache kernel source
        if: inputs.use_cache == true
        id: kernel-src-cache
        uses: actions/cache@v4
        with:
          path: |
            android-kernel/.repo
            android-kernel/common
          key: gki-src-${{ inputs.tag }}
          restore-keys: |
            gki-src-

      - name: Repo sync
        if: ${{ inputs.use_cache != true || steps.kernel-src-cache.outputs.cache-hit != 'true' }}
        run: |
          cd $GITHUB_WORKSPACE/android-kernel
          repo --trace sync -c --force-sync --optimized-fetch --prune --no-tags --no-clone-bundle -j$(nproc --all)
          df -h

      - name: Setup KernelSU
        env:
          PATCH_PATH: ${{ inputs.patch_path }}
          IS_DEBUG_KERNEL: ${{ inputs.debug }}
        run: |
          cd $GITHUB_WORKSPACE/android-kernel
          echo "[+] KernelSU setup"
          GKI_ROOT=$(pwd)
          echo "[+] GKI_ROOT: $GKI_ROOT"
          echo "[+] Copy KernelSU driver to $GKI_ROOT/common/drivers"
          ln -sf $GITHUB_WORKSPACE/KernelSU/kernel $GKI_ROOT/common/drivers/kernelsu
          echo "[+] Add KernelSU driver to Makefile"
          DRIVER_MAKEFILE=$GKI_ROOT/common/drivers/Makefile
          DRIVER_KCONFIG=$GKI_ROOT/common/drivers/Kconfig
          grep -q "kernelsu" "$DRIVER_MAKEFILE" || printf "\nobj-\$(CONFIG_KSU) += kernelsu/\n" >> "$DRIVER_MAKEFILE"
          grep -q "kernelsu" "$DRIVER_KCONFIG" || sed -i "/endmenu/i\\source \"drivers/kernelsu/Kconfig\"" "$DRIVER_KCONFIG"
          echo "[+] Apply Compilation Patches"
          if [ ! -e build/build.sh ]; then
            GLIBC_VERSION=$(ldd --version 2>/dev/null | head -n 1 | awk '{print $NF}')
            echo "GLIBC_VERSION: $GLIBC_VERSION"
            if [ "$(printf '%s\n' "2.38" "$GLIBC_VERSION" | sort -V | head -n1)" = "2.38" ]; then
              echo "Patching resolve_btfids/Makefile"
              cd $GKI_ROOT/common/ && sed -i '/\$(Q)\$(MAKE) -C \$(SUBCMD_SRC) OUTPUT=\$(abspath \$(dir \$@))\/ \$(abspath \$@)/s//$(Q)$(MAKE) -C $(SUBCMD_SRC) EXTRA_CFLAGS="$(CFLAGS)" OUTPUT=$(abspath $(dir $@))\/ $(abspath $@)/' tools/bpf/resolve_btfids/Makefile || echo "No patch needed."
            fi
          fi

          if [ "$IS_DEBUG_KERNEL" = "true" ]; then
            echo "[+] Enable debug features for kernel"
            printf "\nccflags-y += -DCONFIG_KSU_DEBUG\n" >> $GITHUB_WORKSPACE/KernelSU/kernel/Makefile
          fi
          repo status
          echo "[+] KernelSU setup done."

      - name: Enable better_net
        if: ${{ inputs.better_net }}
        run: |
          DEFCONFIG=$GITHUB_WORKSPACE/android-kernel/common/arch/arm64/configs/gki_defconfig
          if ! grep -q '^CONFIG_BPF_STREAM_PARSER=y' "$DEFCONFIG"; then
            {
              echo "CONFIG_BPF_STREAM_PARSER=y"
              echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
              echo "CONFIG_NETFILTER_XT_SET=y"
              echo "CONFIG_IP_SET=y"
              echo "CONFIG_IP_SET_MAX=65534"
              echo "CONFIG_IP_SET_BITMAP_IP=y"
              echo "CONFIG_IP_SET_BITMAP_IPMAC=y"
              echo "CONFIG_IP_SET_BITMAP_PORT=y"
              echo "CONFIG_IP_SET_HASH_IP=y"
              echo "CONFIG_IP_SET_HASH_IPMARK=y"
              echo "CONFIG_IP_SET_HASH_IPPORT=y"
              echo "CONFIG_IP_SET_HASH_IPPORTIP=y"
              echo "CONFIG_IP_SET_HASH_IPPORTNET=y"
              echo "CONFIG_IP_SET_HASH_IPMAC=y"
              echo "CONFIG_IP_SET_HASH_MAC=y"
              echo "CONFIG_IP_SET_HASH_NETPORTNET=y"
              echo "CONFIG_IP_SET_HASH_NET=y"
              echo "CONFIG_IP_SET_HASH_NETNET=y"
              echo "CONFIG_IP_SET_HASH_NETPORT=y"
              echo "CONFIG_IP_SET_HASH_NETIFACE=y"
              echo "CONFIG_IP_SET_LIST_SET=y"
              echo "CONFIG_IP6_NF_NAT=y"
              echo "CONFIG_IP6_NF_TARGET_MASQUERADE=y"
            } >> "$DEFCONFIG"
          fi

      - name: Setup Docker
        if: ${{ inputs.adocker }}
        run: |
          if [ ! -d "$GITHUB_WORKSPACE/docker" ]; then
            echo "docker/ directory not found in repo root."
            exit 1
          fi
          cp -rf "$GITHUB_WORKSPACE/docker" "$GITHUB_WORKSPACE/android-kernel/common/"
          cd $GITHUB_WORKSPACE/android-kernel/common
          sed -i "/endmenu/i\\source \\\"docker/Kconfig\\\"" ./arch/arm64/Kconfig
          echo "CONFIG_DOCKER=y" >> ./arch/arm64/configs/gki_defconfig

      - name: Disable defconfig check
        run: |
          cd $GITHUB_WORKSPACE/android-kernel/common
          for f in build.config.gki.aarch64 build.config.gki; do
            if [ -f "$f" ]; then
              sed -i 's/check_defconfig//g' "$f"
            fi
          done

      - name: Pin clang version (2023-08)
        run: |
          cd $GITHUB_WORKSPACE/android-kernel/common
          if [ -f build.config.constants ]; then
            sed -i -E 's/^CLANG_VERSION=.*/CLANG_VERSION=r450784e/' build.config.constants
            echo "Pinned $(grep -n '^CLANG_VERSION=' build.config.constants)"
          else
            echo "build.config.constants not found, skipping clang pin."
          fi

      - name: Symbol magic
        run: |
          echo "[+] Export all symbol from abi_gki_aarch64.xml"
          COMMON_ROOT=$GITHUB_WORKSPACE/android-kernel/common
          KSU_ROOT=$GITHUB_WORKSPACE/KernelSU
          ABI_XML=$COMMON_ROOT/android/abi_gki_aarch64.xml
          SYMBOL_LIST=$COMMON_ROOT/android/abi_gki_aarch64
          if [ -f $SYMBOL_LIST ] && [ -f $ABI_XML ]; then
            # python3 $KSU_ROOT/scripts/abi_gki_all.py $ABI_XML > $SYMBOL_LIST
            echo "[+] Add KernelSU symbols"
            cat $KSU_ROOT/kernel/export_symbol.txt | awk '{sub("[ \t]+","");print "  "$0}' >> $SYMBOL_LIST
          else
            echo "[+] No abi_gki_all.py found, skip adding symbols"
          fi

      - name: Setup ccache
        if: inputs.use_cache == true
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: gki-kernel-aarch64-${{ inputs.version_name }}
          max-size: 2G
          save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Setup for LKM
        if: ${{ inputs.build_lkm == true }}
        working-directory: android-kernel
        run: |
          pip install ast-grep-cli
          sudo apt-get install llvm-15 -y
          ast-grep -U -p '$$$ check_exports($$$) {$$$}' -r '' common/scripts/mod/modpost.c
          ast-grep -U -p 'check_exports($$$);' -r '' common/scripts/mod/modpost.c
          sed -i '/config KSU/,/help/{s/default y/default m/}' common/drivers/kernelsu/Kconfig
          echo "drivers/kernelsu/kernelsu.ko" >> common/android/gki_aarch64_modules

          # bazel build, android14-5.15, android14-6.1 use bazel
          if [ ! -e build/build.sh ]; then
            sed -i 's/needs unknown symbol/Dont abort when unknown symbol/g' build/kernel/*.sh || echo "No unknown symbol scripts found"
            if [ -e common/modules.bzl ]; then
              sed -i 's/_COMMON_GKI_MODULES_LIST = \[/_COMMON_GKI_MODULES_LIST = \[ "drivers\/kernelsu\/kernelsu.ko",/g' common/modules.bzl
            fi
          else
            TARGET_FILE="build/kernel/build.sh"
            if [ ! -e "$TARGET_FILE" ]; then
              TARGET_FILE="build/build.sh"
            fi
            sed -i 's/needs unknown symbol/Dont abort when unknown symbol/g' $TARGET_FILE || echo "No unknown symbol in $TARGET_FILE"
            sed -i 's/if ! diff -u "\${KERNEL_DIR}\/\${MODULES_ORDER}" "\${OUT_DIR}\/modules\.order"; then/if false; then/g' $TARGET_FILE
            sed -i 's@${ROOT_DIR}/build/abi/compare_to_symbol_list@echo@g' $TARGET_FILE
            sed -i 's/needs unknown symbol/Dont abort when unknown symbol/g' build/kernel/*.sh || echo "No unknown symbol scripts found"
          fi

      - name: Append ashmem exports if missing
        if: startsWith(inputs.version, 'android16-6.12')
        working-directory: android-kernel
        run: |
          FILE=common/drivers/staging/android/ashmem.c
          if [[ -f "$FILE" ]] && ! grep -q 'is_ashmem_file' "$FILE"; then
          cat >>"$FILE" <<'ASHMEM'

          bool is_ashmem_file(struct file *file) { return false; }
          int ashmem_area_name(struct file *file, char *name) { return 0; }
          long ashmem_area_size(struct file *file) { return 0; }
          struct file *ashmem_area_vmfile(struct file *file) { return NULL; }
          EXPORT_SYMBOL_GPL(is_ashmem_file);
          EXPORT_SYMBOL_GPL(ashmem_area_name);
          EXPORT_SYMBOL_GPL(ashmem_area_size);
          EXPORT_SYMBOL_GPL(ashmem_area_vmfile);
          ASHMEM
          fi

          sed -i -E 's/\$\(CONFIG_ANDROID_BINDER_IPC_RUST\)/m/g' common/drivers/android/Makefile

      - name: Make working directory clean to avoid dirty
        working-directory: android-kernel
        run: |
          # Fix bazel build error
          if [ -f common/BUILD.bazel ]; then
            [ -f android/abi_gki_protected_exports_aarch64 ] || sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' common/BUILD.bazel
          fi

          rm common/android/abi_gki_protected_exports_* || echo "No protected exports!"
          # Force clean localversion (avoid -dirty in UTS_RELEASE)
          if [ -f common/scripts/setlocalversion ]; then
            sed -i 's/-dirty//g' common/scripts/setlocalversion
          fi
          git config --global user.email "bot@kernelsu.org"
          git config --global user.name "KernelSUBot"
          cd common/ && git add -A && git commit -a -m "Add KernelSU"
          repo status

      - name: Build Kernel/LKM
        working-directory: android-kernel
        run: |
          if [ ! -z ${{ vars.EXPECTED_SIZE }} ] && [ ! -z ${{ vars.EXPECTED_HASH }} ]; then
            export KSU_EXPECTED_SIZE=${{ vars.EXPECTED_SIZE }}
            export KSU_EXPECTED_HASH=${{ vars.EXPECTED_HASH }}
          fi
          if [ -e build/build.sh ]; then
            LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh CC="/usr/bin/ccache clang"
          else
            if [ "${{ inputs.version }}" == "android16-6.12" ]; then
              tools/bazel run --disk_cache=/home/runner/.cache/bazel --config=fast --config=stamp --lto=thin //common:kernel_aarch64_dist -- --destdir=dist
            else
              tools/bazel run --disk_cache=/home/runner/.cache/bazel --config=fast --config=stamp --lto=thin //common:kernel_aarch64_dist -- --dist_dir=dist
            fi
          fi

      - name: Verify better_net config
        if: ${{ inputs.build_lkm == false && inputs.better_net }}
        working-directory: android-kernel
        run: |
          mkdir -p ../output
          FINAL_CONFIG=""
          FOUND_CONFIGS=$(find out common -type f -name .config 2>/dev/null | sort || true)

          for cfg in \
            "out/${{ inputs.version }}/common/.config" \
            "out/${{ inputs.version }}/.config" \
            "common/out/.config" \
            "common/.config"
          do
            if [ -f "$cfg" ]; then
              FINAL_CONFIG="$cfg"
              break
            fi
          done

          if [ -z "$FINAL_CONFIG" ] && [ -n "$FOUND_CONFIGS" ]; then
            FINAL_CONFIG=$(printf '%s\n' "$FOUND_CONFIGS" | head -n 1)
          fi

          {
            echo "CONFIG_BPF_STREAM_PARSER"
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE"
            echo "CONFIG_NETFILTER_XT_SET"
            echo "CONFIG_IP_SET"
            echo "CONFIG_IP_SET_MAX"
            echo "CONFIG_IP_SET_BITMAP_IP"
            echo "CONFIG_IP_SET_BITMAP_IPMAC"
            echo "CONFIG_IP_SET_BITMAP_PORT"
            echo "CONFIG_IP_SET_HASH_IP"
            echo "CONFIG_IP_SET_HASH_IPMARK"
            echo "CONFIG_IP_SET_HASH_IPPORT"
            echo "CONFIG_IP_SET_HASH_IPPORTIP"
            echo "CONFIG_IP_SET_HASH_IPPORTNET"
            echo "CONFIG_IP_SET_HASH_IPMAC"
            echo "CONFIG_IP_SET_HASH_MAC"
            echo "CONFIG_IP_SET_HASH_NETPORTNET"
            echo "CONFIG_IP_SET_HASH_NET"
            echo "CONFIG_IP_SET_HASH_NETNET"
            echo "CONFIG_IP_SET_HASH_NETPORT"
            echo "CONFIG_IP_SET_HASH_NETIFACE"
            echo "CONFIG_IP_SET_LIST_SET"
            echo "CONFIG_IP6_NF_NAT"
            echo "CONFIG_IP6_NF_TARGET_MASQUERADE"
          } > better_net.expected

          : > better_net.report

          if [ -z "$FINAL_CONFIG" ]; then
            echo "WARNING: final kernel config not found; skipping better_net verification." >> better_net.report
            if [ -n "$FOUND_CONFIGS" ]; then
              echo >> better_net.report
              echo "Found candidate config files:" >> better_net.report
              printf '%s\n' "$FOUND_CONFIGS" >> better_net.report
            fi
          else
            echo "Using final config: $FINAL_CONFIG"
            echo "Using final config: $FINAL_CONFIG" >> better_net.report
            echo >> better_net.report
            while read -r symbol; do
              if grep -q "^${symbol}=" "$FINAL_CONFIG"; then
                grep "^${symbol}=" "$FINAL_CONFIG" >> better_net.report
              elif grep -q "^# ${symbol} is not set" "$FINAL_CONFIG"; then
                grep "^# ${symbol} is not set" "$FINAL_CONFIG" >> better_net.report
              else
                echo "${symbol}=<missing>" >> better_net.report
              fi
            done < better_net.expected
            cp "$FINAL_CONFIG" ../output/final.config
          fi

          cat better_net.report
          cp better_net.report ../output/better_net.report

      - name: Prepare artifacts
        id: prepareArtifacts
        run: |
          OUTDIR=android-kernel/out/${{ inputs.version }}/dist
          if [ ! -e $OUTDIR ]; then
            OUTDIR=android-kernel/dist
          fi
          mkdir output
          if [ "${{ inputs.build_lkm}}" = "true" ]; then
            llvm-strip-15 -d $OUTDIR/kernelsu.ko
            mv $OUTDIR/kernelsu.ko ./output/${{ inputs.version }}_kernelsu.ko
          else
            cp $OUTDIR/Image ./output/
            cp $OUTDIR/Image.lz4 ./output/
            git clone https://github.com/${{ inputs.anykernel_repo }} AnyKernel3
            if [ -n "${{ inputs.anykernel_ref }}" ]; then
              cd AnyKernel3
              git fetch --depth 1 origin "${{ inputs.anykernel_ref }}" || \
                git fetch --depth 1 origin "refs/tags/${{ inputs.anykernel_ref }}" || \
                git fetch --depth 1 origin "${{ inputs.anykernel_ref }}:refs/remotes/origin/${{ inputs.anykernel_ref }}" || \
                git fetch --depth 1 origin
              git checkout "${{ inputs.anykernel_ref }}"
              cd ..
            fi
            rm -rf ./AnyKernel3/.git
            cp $OUTDIR/Image ./AnyKernel3/${{ inputs.anykernel_image_name }}
            (
              cd AnyKernel3
              zip -r9 ../output/AnyKernel3-${{ inputs.version_name }}_${{ inputs.os_patch_level }}.zip * -x .git/*
            )
            sha256sum ./output/AnyKernel3-${{ inputs.version_name }}_${{ inputs.os_patch_level }}.zip \
              > ./output/AnyKernel3-${{ inputs.version_name }}_${{ inputs.os_patch_level }}.zip.sha256
          fi

      - name: Upload Image and Image.gz
        uses: actions/upload-artifact@v5
        if: ${{ inputs.build_lkm == false }}
        with:
          name: Image-${{ inputs.version_name }}_${{ inputs.os_patch_level }}
          path: |
            ./output/Image
            ./output/Image.lz4
            ./output/final.config
            ./output/better_net.report

      - name: Upload AnyKernel3 ZIP
        if: ${{ inputs.build_lkm == false }}
        uses: actions/upload-artifact@v5
        with:
          name: AnyKernel3-${{ inputs.version_name }}_${{ inputs.os_patch_level }}
          path: |
            ./output/AnyKernel3-${{ inputs.version_name }}_${{ inputs.os_patch_level }}.zip
            ./output/AnyKernel3-${{ inputs.version_name }}_${{ inputs.os_patch_level }}.zip.sha256

      - name: Upload LKM
        uses: actions/upload-artifact@v5
        if: ${{ inputs.build_lkm == true }}
        with:
          name: ${{ inputs.version }}-lkm
          path: ./output/*_kernelsu.ko
